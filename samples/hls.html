<html>
  <head>
    <!-- videojs -->
    <link href="https://vjs.zencdn.net/7.17.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.17.0/video.min.js"></script>

    <!-- newrelic browser agent. REMEMBER TO REPLACE THIS SCRIPT WITH YOUR OWN BROWSER AGENT -->
    <!-- <script type="text/javascript" src="agent.js"></script> -->
    <!-- tracker -->
    <script src="../dist/umd/newrelic-video-videojs.min.js"></script>
  </head>

  <body>
    <video
      id="my-video"
      class="video-js"
      controls
      preload="auto"
      width="640"
      height="264"
    >
      <source
        src="https://d2ne8z1csjj3og.cloudfront.net/demos/media/adam/hls/adamdemo.m3u8"
      />
    </video>
    <script>
      var player = videojs('my-video');

      options = {
        info: {
          beacon: 'xxxxxxxxxxx',
          licenseKey: 'xxxxxxxxxxx',
          applicationID: 'xxxxxxxxxxxx',
        },
      };

      // // set up new relic videojs tracker
      const tracker = new VideojsTracker(player, options);

      // List each event type
      if (player.listeners_) {
        Object.keys(player.listeners_).forEach((eventType) => {
          const listeners = player.listeners_[eventType];
          console.log(`${eventType}: ${listeners.length} listener(s)`);
        });
      }
    </script>
  </body>
</html>
