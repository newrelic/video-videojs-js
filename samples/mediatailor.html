<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS MediaTailor Demo - HLS & DASH</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
      }

      h1 {
        color: #333;
      }

      .video-js {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }

      .controls {
        margin-top: 15px;
      }

      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 5px 5px 5px 0;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }

      button:hover {
        background: #0056b3;
      }

      button:disabled {
        background: #6c757d;
        cursor: not-allowed;
      }

      .format-label {
        display: inline-block;
        margin: 10px 10px 0 0;
        font-weight: bold;
        color: #666;
      }

      .status {
        margin-top: 10px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 4px;
        font-size: 14px;
        color: #495057;
      }
    </style>
  </head>
  <body>
    <h1>AWS MediaTailor Demo - HLS & DASH</h1>

    <video
      id="my-player"
      class="video-js vjs-big-play-centered"
      controls
      preload="auto"
    ></video>

    <div class="controls">
      <div>
        <span class="format-label">HLS Format:</span>
        <button onclick="loadHLSStream()">Load HLS Stream</button>
      </div>
      <div>
        <span class="format-label">DASH Format:</span>
        <button onclick="loadDASHStream()">Load DASH Stream</button>
        <small style="color: #666; margin-left: 10px"
          >(Requires DASH source in MediaTailor config)</small
        >
      </div>
    </div>

    <div class="status" id="status">Ready to load stream...</div>

    <!-- Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

    <!-- DASH Support: dash.js + videojs-contrib-dash -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-dash@5.1.1/dist/videojs-dash.min.js"></script>

    <!-- New Relic Tracker -->
    <script src="../dist/umd/newrelic-video-videojs.min.js"></script>

    <script>
      // Initialize player
      const player = videojs('my-player', {
        controls: true,
        autoplay: false,
        preload: 'auto',
        fluid: true,
        muted: true,
      });

      // Initialize New Relic tracker with MediaTailor support
      const tracker = new VideojsTracker(player, {
        info: {
          beacon: 'YOUR_BEACON_URL',
          applicationID: 'YOUR_APPLICATION_ID',
          licenseKey: 'YOUR_LICENSE_KEY',
        },
        mt: {
          enableManifestParsing: true,
        },
      });

      // MediaTailor configuration
      // Session initialization prefix: https://{cloudfront-id}.mediatailor.{region}.amazonaws.com/v1/session/{account-id}/{playback-config-name}/
      const baseUrl =
        'https://YOUR_CLOUDFRONT_ID.mediatailor.REGION.amazonaws.com';
      const accountId = 'YOUR_ACCOUNT_ID';
      const playbackConfig = 'YOUR_PLAYBACK_CONFIG';

      // Status helper
      function updateStatus(message, isError = false) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = message;
        statusEl.style.background = isError ? '#f8d7da' : '#f8f9fa';
        statusEl.style.color = isError ? '#721c24' : '#495057';
        console.log(message);
      }

      // Initialize MediaTailor session and return sessionId
      async function initializeSession(format) {
        // Format: /v1/session/{account-id}/{playback-config-name}/{format}
        const sessionEndpoint = `${baseUrl}/v1/session/${accountId}/${playbackConfig}/${format}`;

        const response = await fetch(sessionEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });

        if (!response.ok) {
          throw new Error(`Session init failed: ${response.status}`);
        }

        const sessionData = await response.json();

        // Extract sessionId from the manifest URL
        const manifestUrl = sessionData.manifestUrl;
        const sessionIdMatch = manifestUrl.match(/aws\.sessionId=([^&]+)/);
        const sessionId = sessionIdMatch ? sessionIdMatch[1] : null;

        return {
          sessionId,
          trackingUrl: sessionData.trackingUrl,
        };
      }

      // Load HLS stream with session initialization
      async function loadHLSStream() {
        try {
          updateStatus('Initializing session...');
          const { sessionId } = await initializeSession('hls');

          if (!sessionId) {
            throw new Error('Failed to get sessionId');
          }

          updateStatus('Loading HLS stream...');

          // Use direct master.m3u8 URL but add sessionId for tracking
          // HLS playback prefix: https://{cloudfront-id}.mediatailor.{region}.amazonaws.com/v1/master/{account-id}/{playback-config-name}/
          const hlsUrl = `${baseUrl}/v1/master/${accountId}/${playbackConfig}/master.m3u8?aws.sessionId=${sessionId}`;

          console.log('HLS URL:', hlsUrl);

          player.src({
            src: hlsUrl,
            type: 'application/x-mpegURL',
          });

          updateStatus('HLS stream loaded! Playing...');
          player.muted(true);
          player.play();
        } catch (error) {
          console.error('Error loading HLS stream:', error);
          updateStatus(`Error loading HLS: ${error.message}`, true);
        }
      }

      // Load DASH stream with session initialization
      async function loadDASHStream() {
        try {
          updateStatus('Initializing session...');
          const { sessionId } = await initializeSession('dash');

          if (!sessionId) {
            throw new Error('Failed to get sessionId');
          }

          updateStatus('Loading DASH stream...');

          // Use direct index.mpd URL but add sessionId for tracking
          // DASH playback prefix: https://{cloudfront-id}.mediatailor.{region}.amazonaws.com/v1/dash/{account-id}/{playback-config-name}/
          const dashUrl = `${baseUrl}/v1/dash/${accountId}/${playbackConfig}/index.mpd?aws.sessionId=${sessionId}`;

          console.log('DASH URL:', dashUrl);

          player.src({
            src: dashUrl,
            type: 'application/dash+xml',
          });

          updateStatus('DASH stream loaded! Playing...');
          player.muted(true);
          player.play();
        } catch (error) {
          console.error('Error loading DASH stream:', error);
          updateStatus(`Error loading DASH: ${error.message}`, true);
        }
      }

      // Log player events for debugging
      player.on('loadedmetadata', () => {
        updateStatus(
          `Stream loaded - Duration: ${player.duration().toFixed(2)}s`,
        );
      });

      player.on('error', (e) => {
        const error = player.error();
        updateStatus(
          `Player Error: ${error?.message || 'Unknown error'}`,
          true,
        );
      });

      player.on('playing', () => {
        const currentSrc = player.currentSrc();
        const format = currentSrc.includes('.m3u8')
          ? 'HLS'
          : currentSrc.includes('.mpd')
            ? 'DASH'
            : 'Unknown';
        updateStatus(
          `Playing ${format} stream - ${player.currentTime().toFixed(2)}s / ${player.duration().toFixed(2)}s`,
        );
      });
    </script>
  </body>
</html>
