<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS MediaTailor Demo</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 20px;
      }

      h1 {
        color: #333;
      }

      .video-js {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
      }

      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 10px 5px 0 0;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>AWS MediaTailor Demo</h1>

    <video
      id="my-player"
      class="video-js vjs-big-play-centered"
      controls
      preload="auto"
    ></video>

    <div>
      <button onclick="loadVODStream()">Load VOD Stream</button>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
    <script src="../dist/umd/newrelic-video-videojs.min.js"></script>

    <script>
      // Initialize player
      const player = videojs('my-player', {
        controls: true,
        autoplay: false,
        preload: 'auto',
        fluid: true,
        muted: true,
      });

      // Initialize New Relic tracker
      const tracker = new VideojsTracker(player, {
        info: {
          beacon: '',
          applicationID: '',
          licenseKey: '',
        },
        mt: {
          enableManifestParsing: true,
        }
      });

      // Load VOD stream
      async function loadVODStream() {
        try {
          const masterUrl = '';
          const sessionEndpoint = masterUrl.replace('/v1/master/', '/v1/session/');

          const response = await fetch(sessionEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              adsParams: {},
            }),
          });

          if (!response.ok) {
            throw new Error(`Session init failed: ${response.status}`);
          }

          const sessionData = await response.json();
          let sessionizedUrl = sessionData.manifestUrl;

          if (sessionizedUrl.startsWith('/')) {
            const baseUrl = new URL(sessionEndpoint);
            sessionizedUrl = `${baseUrl.protocol}//${baseUrl.host}${sessionizedUrl}`;
          }

          player.src({
            src: sessionizedUrl,
            type: 'application/x-mpegURL',
          });

          player.muted(true);
          player.play();
        } catch (error) {
          console.error('Error loading stream:', error);
        }
      }
    </script>
  </body>
</html>
